<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Oracle | Cosmic Guidance</title>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;700&family=Plus+Jakarta+Sans:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050510;
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* --- Animated Cosmic Background --- */
        .cosmos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #101030 0%, #050510 100%);
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-secondary);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-primary);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* --- Cards --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--glass-shadow);
            transition: transform var(--transition-speed), opacity var(--transition-speed);
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: scale(0.95);
        }

        /* --- Form Elements --- */
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* Custom Dropdown House */
        .custom-select {
            position: relative;
            cursor: pointer;
        }

        .select-trigger {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .select-trigger:hover {
            border-color: var(--glass-border);
            background: rgba(255, 255, 255, 0.08);
        }

        .select-trigger.active {
            border-color: var(--accent-secondary);
        }

        .options-panel {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            width: 100%;
            background: #0a0a1a;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .options-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .option {
            padding: 14px 18px;
            transition: background 0.2s;
        }

        .option:hover {
            background: var(--accent-secondary);
        }

        /* --- Buttons --- */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(112, 0, 255, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* --- Result Section --- */
        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .result-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .advice-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .advice-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border-left: 4px solid var(--accent-primary);
        }

        .advice-item.avoid { border-left-color: #ff4b4b; }
        .advice-item.time { border-left-color: var(--accent-secondary); }

        .advice-item h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
        }

        .advice-item p {
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .btn-reset {
            margin-top: 30px;
            background: transparent;
            border: 1px solid var(--glass-border);
            width: 100%;
            padding: 14px;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            color: #fff;
            border-color: #fff;
        }

        /* --- Animations --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 75, 75, 0.9);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .glass-card { padding: 30px 20px; }
            header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

                "Tired": {

        const SIGN_FLAVOR = {
            "Aries": "pioneer spirit", "Taurus": "steadfast anchor", "Gemini": "quick-witted mind",
            "Cancer": "deep empathy", "Leo": "radiant leadership", "Virgo": "meticulous architecture",
            "Libra": "harmonious diplomacy", "Scorpio": "intense investigation", "Sagittarius": "restless exploration",
            "Capricorn": "disciplined building", "Aquarius": "visionary rebellion", "Pisces": "mystical dreaming"
        };

        // --- DOM ELEMENTS ---
        const inputCard = document.getElementById('input-card');
        const resultCard = document.getElementById('result-card');
        const btnReveal = document.getElementById('btn-reveal');
        const btnReset = document.getElementById('btn-reset');
        const moodSelect = document.getElementById('mood-select');
        const optionsPanel = moodSelect.querySelector('.options-panel');
        const selectTrigger = moodSelect.querySelector('.select-trigger');
        const moodLabel = document.getElementById('mood-label');
        const dobInput = document.getElementById('dob');
        const toast = document.getElementById('toast');

        let selectedMood = "";

        // --- CORE FUNCTIONS ---
        function getZodiacInfo(day, month) {
            for (let i = 0; i < ZODIAC_DATES.length; i++) {
                const [[m1, d1], [m2, d2], sign, element] = ZODIAC_DATES[i];
                if ((month === m1 && day >= d1) || (month === m2 && day <= d2)) {
                    return { sign, element };
                }
            }
            return { sign: 'Capricorn', element: 'Earth' };
        }

        function generateAdvice(sign, element, mood) {
            const flavor = SIGN_FLAVOR[sign] || "unique energy";
            const data = ADVICE_DB[element][mood];
            
            const randomPick = (arr) => arr[Math.floor(Math.random() * arr.length)];
            
            let focus = randomPick(data.focus);
            focus = focus.charAt(0).toLowerCase() + focus.slice(1);

            return {
                focus: `Utilize your ${flavor} to ${focus}`,
                avoid: randomPick(data.avoid),
                time: randomPick(data.time)
            };
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // --- EVENT HANDLERS ---
        moodSelect.addEventListener('click', () => {
            optionsPanel.classList.toggle('show');
            selectTrigger.classList.toggle('active');
        });

        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedMood = opt.dataset.value;
                moodLabel.innerText = selectedMood;
                optionsPanel.classList.remove('show');
                selectTrigger.classList.remove('active');
            });
        });

        dobInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length >= 2) {
                val = val.slice(0, 2) + ' / ' + val.slice(2, 4);
            }
            e.target.value = val;
        });

        btnReveal.addEventListener('click', () => {
            const name = document.getElementById('user-name').value || "Seeker";
            const dob = dobInput.value;

            if (!dob || !selectedMood || dob.length < 7) {
                showToast("The cosmic resonance is incomplete.");
                return;
            }

            try {
                const parts = dob.split(' / ');
                const d = parseInt(parts[0]);
                const m = parseInt(parts[1]);

                if (isNaN(d) || isNaN(m) || m < 1 || m > 12 || d < 1 || d > 31) throw new Error();

                const { sign, element } = getZodiacInfo(d, m);
                const advice = generateAdvice(sign, element, selectedMood);

                // Update UI
                document.getElementById('res-name').innerText = name;
                document.getElementById('res-zodiac').innerText = `${sign} | ${element}`;
                document.getElementById('res-focus').innerText = advice.focus;
                document.getElementById('res-avoid').innerText = advice.avoid;
                document.getElementById('res-time').innerText = advice.time;

                inputCard.classList.add('hidden');
                setTimeout(() => {
                    resultCard.classList.remove('hidden');
                }, 400);

            } catch (err) {
                showToast("Invalid temporal coordinates.");
            }
        });

        btnReset.addEventListener('click', () => {
            resultCard.classList.add('hidden');
            setTimeout(() => {
                inputCard.classList.remove('hidden');
            }, 400);
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!moodSelect.contains(e.target)) {
                optionsPanel.classList.remove('show');
                selectTrigger.classList.remove('active');
            }
        });
    </script>
</body>
</html>
