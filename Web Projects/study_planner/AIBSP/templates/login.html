<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ScriptSeekers Academy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="logo-area" style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.8rem; font-weight: 800;">ScriptSeekers<span>Academy</span></h1>
        </div>

        <h2>Welcome Back</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit">Authentication Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 30px; color: var(--text-dim); font-size: 0.9rem;">
            New to Academy? <a href="{{ url_for('register') }}" style="color: var(--primary-light); text-decoration: none; font-weight: 700;">Join Now</a>
        </p>
    </div>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
